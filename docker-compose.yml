services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: inventory-backend
    restart: unless-stopped
    volumes:
      - ./data:/app/data
    environment:
      - INVENTORY_ADMIN_USER=admin
      - INVENTORY_ADMIN_PASSWORD=admin123
      - INVENTORY_ADMIN_TOKEN=inventory-admin-token
    ports:
      - "8000:8000"
    networks:
      - inventory-net

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: inventory-frontend
    restart: unless-stopped
    ports:
      - "80:80"
      - "8443:443"  
    depends_on:
      - backend
    networks:
      - inventory-net

networks:
  inventory-net:
    driver: bridge