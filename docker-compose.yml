services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: inventory-backend
    restart: unless-stopped
    volumes:
      - ./data:/app/data
    environment:
      - INVENTORY_ADMIN_USER=admin
      - INVENTORY_ADMIN_PASSWORD=admin123
      - INVENTORY_ADMIN_TOKEN=inventory-admin-token
    expose:
      - "8000"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: inventory-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
